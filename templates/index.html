.typewriter h1 {
  text-align: center;
  margin: 2rem auto; /* Reduced from 6rem */
  padding: 0;         /* Ensure no extra padding */
  color: #333;
  font-size: 2em;
  overflow: hidden;
  white-space: nowrap;
  letter-spacing: 0.15em;
  width: 0;
  border-right: 3px solid #333;

  animation: typing 3.5s steps(18, end) forwards, fadeCursor 1s ease-in 3.5s forwards;
}
.box{
  margin: 0.5rem;
  padding: 0.5rem;
  border-radius: 0.5rem;
  border: 1px solid #ccc;
  background-color: black;
  color: white;
}
.box:hover{
  text-shadow: 2px 2px 3px whitesmoke;

}
/* Typing effect */
@keyframes typing {
  from { width: 0 }
  to { width: 75% }
}


/* Cursor fade-out using opacity */
@keyframes fadeCursor {
  from { opacity: 1 }
  to { opacity: 0 }
}


@keyframes blink-caret {
  0%, 100% { border-right-color: transparent }
  50% { border-right-color: white}
}
.loader {
  display: none;
  position: flex;
  justify-content: center;
  align-items: center;

  color: #333;
  text-align: center;
  
}

.loader span {
  align-items: center;
  position: relative;
  animation: blink 1s infinite;
  font-size: 7rem;
  z-index: 1000;
}

.loader span:nth-child(2) {
  animation-delay: 0.2s;
}
.loader span:nth-child(3) {
  animation-delay: 0.4s;
}
.bot{
  white-space: pre-wrap; /* Preserve whitespace and line breaks */
}
@keyframes blink {
  0% { opacity: 0 }
  50% { opacity: 1 }
  100% { opacity: 0 }
}
body{
  background-color: white;
}

<script>
document.addEventListener('DOMContentLoaded', () => {
  const chatForm = document.getElementById('chatForm');
  const userInput = document.getElementById('userInput');
  const box = document.querySelector('.box');
  const loader = document.getElementById('loader');
  const bodyColor = document.getElementById('bodyColor');
  let isStreaming = false;

  chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isStreaming) return;

    const message = userInput.value.trim();
    if (!message) return;

    isStreaming = true;
    userInput.value = '';
    userInput.disabled = true;

    // 1. Append User message to the chat box
    const userPara = document.createElement('p');
    userPara.className = 'bot';
    userPara.innerHTML = `<strong>You: </strong> `;
    const userText = document.createTextNode(message);
    userPara.appendChild(userText);
    box.appendChild(userPara);

    // Scroll to bottom
    window.scrollTo(0, document.body.scrollHeight);

    // 2. Show loader and apply blur
    loader.style.display = 'block';
    bodyColor.style.filter = 'blur(3px)';

    try {
      // 3. Post user message to streaming endpoint
      const response = await fetch('/stream', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: new URLSearchParams({ 'user_input': message })
      });

      if (!response.ok) {
        throw new Error('Network response was not ok');
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let done = false;
      let firstChunkReceived = false;
      let botPara, textNode;

      while (!done) {
        const { value, done: doneReading } = await reader.read();
        done = doneReading;
        if (value) {
          const chunkValue = decoder.decode(value, { stream: !done });
          
          if (!firstChunkReceived) {
            firstChunkReceived = true;
            // Hide loader and remove blur on first character/chunk
            loader.style.display = 'none';
            bodyColor.style.filter = 'none';

            // Create bot response paragraph
            botPara = document.createElement('p');
            botPara.className = 'bot';
            botPara.innerHTML = `<strong>Bot: </strong> `;
            textNode = document.createTextNode('');
            botPara.appendChild(textNode);
            box.appendChild(botPara);
          }

          // Append chunk text
          textNode.appendData(chunkValue);
          // Scroll to bottom
          window.scrollTo(0, document.body.scrollHeight);
        }
      }
    } catch (error) {
      console.error('Error in streaming:', error);
      // Clean up loader and blur
      loader.style.display = 'none';
      bodyColor.style.filter = 'none';
      
      const errorPara = document.createElement('p');
      errorPara.className = 'bot';
      errorPara.innerHTML = `<strong>System Error: </strong> Could not connect to chatbot.`;
      box.appendChild(errorPara);
      window.scrollTo(0, document.body.scrollHeight);
    } finally {
      isStreaming = false;
      userInput.disabled = false;
      userInput.focus();
    }
  });
});
</script>
